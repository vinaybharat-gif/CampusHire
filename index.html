<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusHire</title>
<style>
body{font-family:Arial;background:#667eea;color:#333;display:flex;justify-content:center;align-items:center;height:100vh}
.container{background:white;padding:30px;border-radius:10px;width:350px}
input,select,button{width:100%;padding:10px;margin:8px 0}
button{background:#667eea;color:white;border:none}
.tab{cursor:pointer;padding:10px;display:inline-block}
.active{font-weight:bold}
</style>
</head>
<body>

<div class="container">

<div>
<span class="tab active" onclick="showLogin()">Login</span>
<span class="tab" onclick="showRegister()">Register</span>
</div>

<form id="loginForm">
<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<form id="registerForm" style="display:none">
<input type="text" id="regName" placeholder="Full Name" required>
<input type="email" id="regEmail" placeholder="Email" required>
<input type="password" id="regPassword" placeholder="Password" required>
<select id="regRole">
<option value="student">Student</option>
<option value="recruiter">Recruiter</option>
<option value="admin">Admin</option>
</select>
<button type="submit">Register</button>
</form>

<div id="msg"></div>

</div>

<script>

const API_BASE="https://project-um8h.onrender.com"

function showLogin(){
document.getElementById("loginForm").style.display="block"
document.getElementById("registerForm").style.display="none"
}

function showRegister(){
document.getElementById("loginForm").style.display="none"
document.getElementById("registerForm").style.display="block"
}

document.getElementById("registerForm").addEventListener("submit",async(e)=>{
e.preventDefault()

const name=document.getElementById("regName").value
const email=document.getElementById("regEmail").value
const password=document.getElementById("regPassword").value
const role=document.getElementById("regRole").value

const res=await fetch(API_BASE+"/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,email,password,role})
})

const data=await res.json()
document.getElementById("msg").innerText=data.message||data.error
})

document.getElementById("loginForm").addEventListener("submit",async(e)=>{
e.preventDefault()

const email=document.getElementById("loginEmail").value
const password=document.getElementById("loginPassword").value

const res=await fetch(API_BASE+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
})

const data=await res.json()

if(res.ok){
localStorage.setItem("token",data.token)
document.getElementById("msg").innerText="Login Successful"
}else{
document.getElementById("msg").innerText=data.error
}

})

</script>

</body>
</html>
